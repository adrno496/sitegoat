<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci — GOAT FUEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06050e;
  --surface:#100f1e;
  --fire1:#ff4d00;
  --fire2:#ff7a00;
  --fire3:#ffaa00;
  --purple:#7c3aed;
  --text:#f0ecf8;
  --text2:#7e7a8e;
}
html{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100svh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* Grain */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* Glow BG */
.glow-bg{position:fixed;top:50%;left:50%;width:700px;height:700px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,77,0,.08),rgba(124,58,237,.06) 55%,transparent 75%);pointer-events:none;z-index:0}

/* Nav */
nav{padding:18px 24px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2;max-width:1200px;margin:0 auto;width:100%}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;display:flex;align-items:center;gap:10px;letter-spacing:3px}
.nav-logo img{height:28px;width:auto;object-fit:contain}

/* Main */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;z-index:1}
.card{max-width:520px;width:100%;text-align:center}

/* Icon */
.icon-wrap{width:88px;height:88px;border-radius:28px;background:linear-gradient(135deg,var(--fire1),var(--fire2));display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 36px;box-shadow:0 0 60px rgba(255,77,0,.3),0 16px 40px rgba(255,77,0,.2)}

/* Text */
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,7vw,72px);line-height:1;letter-spacing:2px;margin-bottom:20px}
.gradient{background:linear-gradient(135deg,var(--fire1),var(--fire3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:var(--text2);font-size:17px;line-height:1.7;font-weight:300;margin-bottom:12px}
p strong{color:var(--fire2);font-weight:600}

/* Divider */
.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);margin:36px auto;max-width:300px}

/* Buttons */
.actions{display:flex;flex-direction:column;gap:14px;align-items:center;margin-top:36px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:16px 36px;border-radius:60px;font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .3s ease;border:none}
.btn-primary{background:linear-gradient(135deg,var(--fire1),var(--fire2));color:#fff;box-shadow:0 0 40px rgba(255,77,0,.2)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 60px rgba(255,77,0,.4)}
.btn-insta{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);color:#fff;box-shadow:0 0 30px rgba(225,48,108,.15)}
.btn-insta:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(225,48,108,.35)}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid rgba(255,255,255,.1);font-size:14px;padding:12px 28px}
.btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,.2)}

/* Beta note */
.beta-note{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:40px;border:1px solid rgba(255,77,0,.25);background:rgba(255,77,0,.06);font-size:12px;font-weight:600;color:var(--fire2);margin-bottom:32px;letter-spacing:.5px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--fire2);animation:pdot 2s infinite;flex-shrink:0}
@keyframes pdot{50%{opacity:.25}}

/* Footer */
footer{padding:24px;text-align:center;font-size:12px;color:var(--text2);position:relative;z-index:2}

/* Anim */
.card{animation:fadeup .6s ease both}
@keyframes fadeup{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="glow-bg"></div>

<nav>
  <a href="goat-fuel.html" class="nav-logo">
    <img src="images/logo-goat.png" alt="GOAT FUEL Logo">
    GOAT FUEL
  </a>
  <a href="goat-fuel.html" class="btn btn-ghost" style="padding:10px 20px;font-size:13px">← Retour</a>
</nav>

<main>
  <div class="card">
    <div class="beta-note"><span class="dot"></span> Bêta en cours</div>
    <div class="icon-wrap">🙌</div>
    <h1>MERCI.<br>C'EST <span class="gradient">NOTÉ.</span></h1>
    <p>Je t'envoie l'accès à la bêta par mail <strong>dès que possible.</strong></p>
    <p>En attendant, rejoins Instagram pour suivre le lancement en direct, voir les nouveautés et ne rien manquer.</p>

    <div class="sep"></div>

    <div class="actions">
      <a href="https://www.instagram.com/goatfuelapp?igsh=eXhvaGQ2cml3NDl6" target="_blank" rel="noopener" class="btn btn-insta">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        Rejoindre Instagram
      </a>
      <a href="goat-fuel.html" class="btn btn-ghost">Retour au site</a>
    </div>
  </div>
</main>

<footer>© 2026 GOAT FUEL — Fuel the GOAT in you.</footer>

</body>
</html>
